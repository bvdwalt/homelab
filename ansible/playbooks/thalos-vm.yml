---
# Provisions a Talos Linux VM on TrueNAS SCALE.
#
# What this does:
#   1. Fetches the Talos factory ISO (with qemu-guest-agent) via the image factory API.
#   2. Copies the ISO to TrueNAS storage over SSH.
#   3. Creates a zvol on the Cheetah pool for the VM OS disk.
#   4. Creates and starts the VM via the TrueNAS REST API.
#   5. Outputs the VM's MAC address so you can add a DHCP reservation in AdGuard,
#      then waits for the Talos API port (50000) to become reachable.
#
# Prerequisites:
#   - TRUENAS_API_KEY env var set
#   - SSH access to truenas (from inventory)
#   - The Hare/apps ZFS dataset must exist (run truenas-datasets.yml first)
#
# After this playbook:
#   Run thalos-bootstrap.yml to generate/apply the machine config and stand up the cluster.

- name: Download Talos factory ISO locally
  hosts: localhost
  gather_facts: false

  vars:
    talos_factory_url: https://factory.talos.dev
    talos_iso_local: /tmp/talos-amd64.iso
    talos_schematic:
      customization:
        systemExtensions:
          officialExtensions:
            - siderolabs/qemu-guest-agent

  tasks:
    - name: Submit schematic to Talos image factory
      ansible.builtin.uri:
        url: "{{ talos_factory_url }}/schematics"
        method: POST
        body_format: json
        body: "{{ talos_schematic }}"
        status_code: [200, 201]
        return_content: true
      register: schematic_response

    - name: Set schematic ID fact
      ansible.builtin.set_fact:
        talos_schematic_id: "{{ schematic_response.json.id }}"

    - name: Show schematic ID
      ansible.builtin.debug:
        msg: "Talos schematic ID: {{ talos_schematic_id }}"

    - name: Download Talos factory ISO (qemu-guest-agent included)
      ansible.builtin.get_url:
        url: "{{ talos_factory_url }}/image/{{ talos_schematic_id }}/{{ talos_version }}/metal-amd64.iso"
        dest: "{{ talos_iso_local }}"
        mode: "0644"
      register: iso_download

- name: Copy ISO to TrueNAS storage
  hosts: truenas
  gather_facts: false

  vars:
    talos_iso_local: /tmp/talos-amd64.iso

  tasks:
    - name: Copy Talos ISO to TrueNAS
      ansible.builtin.copy:
        src: "{{ talos_iso_local }}"
        dest: "{{ talos_iso_remote_path }}"
        mode: "0644"
      register: iso_copy

- name: Create Talos VM via TrueNAS API
  hosts: localhost
  gather_facts: false

  vars:
    zvol_name: "{{ talos_vm_pool }}/vm-{{ talos_vm_name }}"

  tasks:
    - name: Fetch existing datasets
      ansible.builtin.uri:
        url: "{{ truenas_url }}/api/v2.0/pool/dataset?limit=0"
        headers:
          Authorization: "Bearer {{ truenas_api_key }}"
        validate_certs: false
      register: existing_datasets

    - name: Create VM OS disk zvol
      ansible.builtin.uri:
        url: "{{ truenas_url }}/api/v2.0/pool/dataset"
        method: POST
        headers:
          Authorization: "Bearer {{ truenas_api_key }}"
        body_format: json
        body:
          name: "{{ zvol_name }}"
          type: VOLUME
          volsize: "{{ talos_vm_disk_size }}"
          volblocksize: "16K"
          compression: ZSTD
        validate_certs: false
      when: zvol_name not in (existing_datasets.json | map(attribute='name') | list)

    - name: Fetch existing VMs
      ansible.builtin.uri:
        url: "{{ truenas_url }}/api/v2.0/vm?limit=0"
        headers:
          Authorization: "Bearer {{ truenas_api_key }}"
        validate_certs: false
      register: existing_vms

    - name: Create Talos VM (no devices — added separately below)
      ansible.builtin.uri:
        url: "{{ truenas_url }}/api/v2.0/vm"
        method: POST
        headers:
          Authorization: "Bearer {{ truenas_api_key }}"
        body_format: json
        body:
          name: "{{ talos_vm_name }}"
          cpu_mode: HOST-PASSTHROUGH
          vcpus: "{{ talos_vm_cores }}"
          memory: "{{ talos_vm_memory }}"
          bootloader: UEFI
          autostart: true
        validate_certs: false
      register: created_vm
      when: existing_vms.json | selectattr('name', 'equalto', talos_vm_name) | list | length == 0

    - name: Set VM ID fact
      ansible.builtin.set_fact:
        talos_vm_id: >-
          {{
            created_vm.json.id
            if created_vm is not skipped
            else (existing_vms.json | selectattr('name', 'equalto', talos_vm_name) | first).id
          }}

    - name: Fetch existing VM devices
      ansible.builtin.uri:
        url: "{{ truenas_url }}/api/v2.0/vm/device?limit=0"
        headers:
          Authorization: "Bearer {{ truenas_api_key }}"
        validate_certs: false
      register: existing_devices

    - name: Set existing device types for this VM
      ansible.builtin.set_fact:
        vm_device_types: >-
          {{
            existing_devices.json
            | selectattr('vm', 'equalto', talos_vm_id | int)
            | map(attribute='attributes.dtype')
            | list
          }}

    - name: Add DISK device
      ansible.builtin.uri:
        url: "{{ truenas_url }}/api/v2.0/vm/device"
        method: POST
        headers:
          Authorization: "Bearer {{ truenas_api_key }}"
        body_format: json
        body:
          vm: "{{ talos_vm_id | int }}"
          attributes:
            dtype: DISK
            path: "/dev/zvol/{{ zvol_name }}"
            type: VIRTIO
        validate_certs: false
      when: "'DISK' not in vm_device_types"

    - name: Add NIC device
      ansible.builtin.uri:
        url: "{{ truenas_url }}/api/v2.0/vm/device"
        method: POST
        headers:
          Authorization: "Bearer {{ truenas_api_key }}"
        body_format: json
        body:
          vm: "{{ talos_vm_id | int }}"
          attributes:
            dtype: NIC
            type: VIRTIO
            nic_attach: "{{ talos_vm_bridge }}"
            mac: "{{ talos_vm_mac }}"
        validate_certs: false
      when: "'NIC' not in vm_device_types"

    - name: Set existing NIC MACs for this VM
      ansible.builtin.set_fact:
        vm_nic_macs: >-
          {{
            existing_devices.json
            | selectattr('vm', 'equalto', talos_vm_id | int)
            | selectattr('attributes.dtype', 'equalto', 'NIC')
            | map(attribute='attributes.mac')
            | list
          }}

    - name: Add mgmt NIC device (br1 — host-only bridge for TrueNAS API access)
      ansible.builtin.uri:
        url: "{{ truenas_url }}/api/v2.0/vm/device"
        method: POST
        headers:
          Authorization: "Bearer {{ truenas_api_key }}"
        body_format: json
        body:
          vm: "{{ talos_vm_id | int }}"
          attributes:
            dtype: NIC
            type: VIRTIO
            nic_attach: "{{ talos_vm_mgmt_bridge }}"
            mac: "{{ talos_vm_mgmt_mac }}"
        validate_certs: false
      when: talos_vm_mgmt_mac not in vm_nic_macs

    - name: Add CDROM device (Talos ISO)
      ansible.builtin.uri:
        url: "{{ truenas_url }}/api/v2.0/vm/device"
        method: POST
        headers:
          Authorization: "Bearer {{ truenas_api_key }}"
        body_format: json
        body:
          vm: "{{ talos_vm_id | int }}"
          attributes:
            dtype: CDROM
            path: "{{ talos_iso_remote_path }}"
        validate_certs: false
      when: "'CDROM' not in vm_device_types"

    - name: Add DISPLAY device (VNC — needed to access boot console)
      ansible.builtin.uri:
        url: "{{ truenas_url }}/api/v2.0/vm/device"
        method: POST
        headers:
          Authorization: "Bearer {{ truenas_api_key }}"
        body_format: json
        body:
          vm: "{{ talos_vm_id | int }}"
          attributes:
            dtype: DISPLAY
            type: SPICE
            bind: 0.0.0.0
            web: true
            password: "{{ talos_vm_display_password }}"
        validate_certs: false
      when: "'DISPLAY' not in vm_device_types"

    - name: Fetch NIC device to get MAC address
      ansible.builtin.uri:
        url: "{{ truenas_url }}/api/v2.0/vm/device?limit=0"
        headers:
          Authorization: "Bearer {{ truenas_api_key }}"
        validate_certs: false
      register: all_devices

    - name: Set NIC MAC on existing device (if null — idempotent for future runs)
      ansible.builtin.set_fact:
        existing_nic_device: >-
          {{
            all_devices.json
            | selectattr('vm', 'equalto', talos_vm_id | int)
            | selectattr('attributes.dtype', 'equalto', 'NIC')
            | first
          }}

    - name: Patch NIC device MAC if missing or different from talos_vm_mac
      ansible.builtin.uri:
        url: "{{ truenas_url }}/api/v2.0/vm/device/id/{{ existing_nic_device.id }}"
        method: PUT
        headers:
          Authorization: "Bearer {{ truenas_api_key }}"
        body_format: json
        body:
          attributes:
            dtype: NIC
            type: VIRTIO
            nic_attach: "{{ talos_vm_bridge }}"
            mac: "{{ talos_vm_mac }}"
        validate_certs: false
      when: existing_nic_device.attributes.mac != talos_vm_mac

    - name: Fetch VM details to check running state
      ansible.builtin.uri:
        url: "{{ truenas_url }}/api/v2.0/vm/id/{{ talos_vm_id }}"
        headers:
          Authorization: "Bearer {{ truenas_api_key }}"
        validate_certs: false
      register: vm_details

    - name: Start Talos VM (if not already running)
      ansible.builtin.uri:
        url: "{{ truenas_url }}/api/v2.0/vm/id/{{ talos_vm_id }}/start"
        method: POST
        headers:
          Authorization: "Bearer {{ truenas_api_key }}"
        body_format: json
        body: {}
        validate_certs: false
      when: vm_details.json.status.state != 'RUNNING'

    - name: Wait for Talos maintenance API (port 50000) on current DHCP IP
      ansible.builtin.wait_for:
        host: "{{ talos_maintenance_ip }}"
        port: 50000
        timeout: 300
        delay: 10
        msg: "Talos API not reachable at {{ talos_maintenance_ip }}:50000 — is the VM booted?"

    - name: VM is in maintenance mode and ready
      ansible.builtin.debug:
        msg: >
          Talos VM is up at {{ talos_maintenance_ip }} (maintenance mode).
          MAC: {{ talos_vm_mac }} — ensure DHCP reservation {{ talos_vm_mac }} -> {{ talos_cp_ip }} is set in your router.
          Run thalos-bootstrap.yml next.
