---
# Tears down the Talos cluster VM and cleans up local generated configs.
#
# What this does:
#   1. Stops the VM gracefully via TrueNAS API (ACPI shutdown via guest agent).
#   2. Deletes the VM and all its devices.
#   3. Deletes the zvol (OS disk).
#   4. Removes locally generated Talos configs (clusterconfig/, kubeconfig).
#
# What this does NOT do:
#   - Delete talsecret.sops.yaml — keep it to reuse the same cluster CA/secrets
#     on the next run, or delete it manually to start completely fresh.
#   - Delete the Talos ISO from TrueNAS storage.
#
# After this playbook:
#   Re-run thalos-vm.yml then thalos-bootstrap.yml to provision from scratch.

- name: Tear down Talos VM and clean up local configs
  hosts: localhost
  gather_facts: false

  vars:
    talos_dir: "{{ playbook_dir | dirname | dirname }}/k8s/talos"
    zvol_name: "{{ talos_vm_pool }}/vm-{{ talos_vm_name }}"

  tasks:
    # -------------------------------------------------------------------------
    # Find the VM
    # -------------------------------------------------------------------------

    - name: Fetch VM list
      ansible.builtin.uri:
        url: "{{ truenas_url }}/api/v2.0/vm?limit=0"
        headers:
          Authorization: "Bearer {{ truenas_api_key }}"
        validate_certs: false
      register: all_vms

    - name: Find target VM
      ansible.builtin.set_fact:
        target_vm: >-
          {{
            all_vms.json
            | selectattr('name', 'equalto', talos_vm_name)
            | list
            | first
            | default(none)
          }}

    - name: Abort if VM not found
      ansible.builtin.debug:
        msg: "VM '{{ talos_vm_name }}' not found — nothing to delete."
      when: target_vm is none

    # -------------------------------------------------------------------------
    # Stop VM
    # -------------------------------------------------------------------------

    - name: Stop VM (ACPI shutdown — graceful via guest agent)
      ansible.builtin.uri:
        url: "{{ truenas_url }}/api/v2.0/vm/id/{{ target_vm.id }}/stop"
        method: POST
        headers:
          Authorization: "Bearer {{ truenas_api_key }}"
        body_format: json
        body:
          force_after_timeout: true
        validate_certs: false
        status_code: [200, 204]
      when: target_vm is not none and target_vm.status.state == 'RUNNING'

    - name: Wait for VM to stop
      ansible.builtin.uri:
        url: "{{ truenas_url }}/api/v2.0/vm/id/{{ target_vm.id }}"
        headers:
          Authorization: "Bearer {{ truenas_api_key }}"
        validate_certs: false
      register: vm_state
      until: vm_state.json.status.state != 'RUNNING'
      retries: 30
      delay: 5
      when: target_vm is not none and target_vm.status.state == 'RUNNING'

    # -------------------------------------------------------------------------
    # Delete VM (devices are deleted automatically by TrueNAS)
    # -------------------------------------------------------------------------

    - name: Delete VM
      ansible.builtin.uri:
        url: "{{ truenas_url }}/api/v2.0/vm/id/{{ target_vm.id }}"
        method: DELETE
        headers:
          Authorization: "Bearer {{ truenas_api_key }}"
        validate_certs: false
        status_code: [200, 204]
      when: target_vm is not none

    # -------------------------------------------------------------------------
    # Delete zvol
    # -------------------------------------------------------------------------

    - name: Fetch dataset list
      ansible.builtin.uri:
        url: "{{ truenas_url }}/api/v2.0/pool/dataset?limit=0"
        headers:
          Authorization: "Bearer {{ truenas_api_key }}"
        validate_certs: false
      register: all_datasets

    - name: Find zvol
      ansible.builtin.set_fact:
        target_zvol: >-
          {{
            all_datasets.json
            | selectattr('name', 'equalto', zvol_name)
            | list
            | first
            | default(none)
          }}

    - name: Delete zvol
      ansible.builtin.uri:
        url: "{{ truenas_url }}/api/v2.0/pool/dataset/id/{{ target_zvol.id | replace('/', '%2F') }}"
        method: DELETE
        headers:
          Authorization: "Bearer {{ truenas_api_key }}"
        body_format: json
        body:
          recursive: false
        validate_certs: false
        status_code: [200, 204]
      when: target_zvol is not none

    - name: Zvol not found (already deleted)
      ansible.builtin.debug:
        msg: "Zvol '{{ zvol_name }}' not found — skipping."
      when: target_zvol is none

    # -------------------------------------------------------------------------
    # Clean up local generated configs
    # -------------------------------------------------------------------------

    - name: Remove generated clusterconfig directory
      ansible.builtin.file:
        path: "{{ talos_dir }}/clusterconfig"
        state: absent

    - name: Remove kubeconfig
      ansible.builtin.file:
        path: "{{ talos_dir }}/kubeconfig"
        state: absent

    - name: Teardown complete
      ansible.builtin.debug:
        msg: >
          Teardown complete. talsecret.sops.yaml has been kept — delete it manually
          if you want to regenerate cluster secrets on the next run.
          Re-run thalos-vm.yml then thalos-bootstrap.yml to start fresh.
