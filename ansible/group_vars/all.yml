# Talos VM
# -----------------------------------------------------------------------

talos_version: v1.9.5            # check https://github.com/siderolabs/talos/releases
kubernetes_version: v1.32.4      # check https://www.talos.dev/latest/introduction/support-matrix/
talos_cluster_name: homelab
talos_cp_ip: 10.13.1.166
