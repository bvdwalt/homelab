misconfigurations:
  - id: AVD-KSV-0017
    paths:
      - "k8s/altair/apps/jellyfin.yaml"
    statement: "Privileged required for Intel QSV hardware transcoding in Proxmox LXC where setgroups is blocked"

  - id: AVD-KSV-0017
    paths:
      - "k8s/charts/homelab-app/templates/deployment.yaml"
    statement: "Privileged is opt-in via .Values.securityContext.privileged; only enabled for Jellyfin (see above)"

  - id: AVD-KSV-0109
    paths:
      - "k8s/altair/apps/backrest-scripts.yaml"
      - "k8s/raspi/apps/backrest-scripts.yaml"
    statement: "False positive: scripts reference $password/$username as shell variables populated at runtime from SOPS secrets via env; no credentials are stored in the ConfigMap"

  - id: AVD-KSV-0041
    paths:
      - "k8s/altair/flux-system/gotk-components.yaml"
      - "k8s/raspi/flux-system/gotk-components.yaml"
    statement: "Flux-managed ClusterRole; generated by flux install and not user-modifiable"

  - id: AVD-KSV-0046
    paths:
      - "k8s/altair/flux-system/gotk-components.yaml"
      - "k8s/raspi/flux-system/gotk-components.yaml"
    statement: "Flux-managed ClusterRole; generated by flux install and not user-modifiable"
