misconfigurations:
  - id: AVD-KSV-0017
    paths:
      - "altair/apps/jellyfin.yaml"
    statement: "Privileged required for Intel QSV hardware transcoding in Proxmox LXC where setgroups is blocked"

  - id: AVD-KSV-0017
    paths:
      - "charts/homelab-app/templates/deployment.yaml"
    statement: "Privileged is opt-in via .Values.securityContext.privileged; only enabled for Jellyfin (see above)"

  - id: AVD-KSV-0109
    paths:
      - "altair/apps/backrest-scripts.yaml"
      - "raspi/apps/backrest-scripts.yaml"
    statement: "False positive: scripts reference $password/$username as shell variables populated at runtime from SOPS secrets via env; no credentials are stored in the ConfigMap"

  - id: AVD-KSV-01010
    paths:
      - "altair/apps/backrest-scripts.yaml"
      - "raspi/apps/backrest-scripts.yaml"
    statement: "False positive: scripts reference $password/$username as shell variables populated at runtime from SOPS secrets via env; no credentials are stored in the ConfigMap"

  - id: AVD-KSV-0014
    paths:
      - "altair/apps/cullarr.yaml"
    statement: "Image runs as root (no USER set); readOnlyRootFilesystem requires image-level fix first"

  - id: AVD-KSV-0014
    paths:
      - "altair/apps/downloads/deployment.yaml"
    statement: "LinuxServer.io s6-overlay images require writable root FS during init; PUID/PGID drop happens after startup"

  - id: AVD-KSV-0118
    paths:
      - "altair/apps/downloads/deployment.yaml"
    statement: "LinuxServer.io s6-overlay init runs as root before dropping to PUID/PGID; runAsNonRoot cannot be set"

  - id: AVD-KSV-0014
    paths:
      - "altair/apps/gitea/deployment.yaml"
    statement: "Gitea entrypoint starts as root to chown /data then drops to USER_UID; multiple internal paths need write access beyond the PVC"

  - id: AVD-KSV-0118
    paths:
      - "altair/apps/gitea/deployment.yaml"
    statement: "Gitea entrypoint requires root to chown mounted volumes before dropping to USER_UID/GID; runAsNonRoot cannot be set at pod level"

  - id: AVD-KSV-0041
    paths:
      - "altair/flux-system/gotk-components.yaml"
      - "raspi/flux-system/gotk-components.yaml"
    statement: "Flux-managed ClusterRole; generated by flux install and not user-modifiable"

  - id: AVD-KSV-0046
    paths:
      - "altair/flux-system/gotk-components.yaml"
      - "raspi/flux-system/gotk-components.yaml"
    statement: "Flux-managed ClusterRole; generated by flux install and not user-modifiable"
