name: Trivy image scan

on:
  workflow_dispatch:
  schedule:
    - cron: '0 6 * * 1' # weekly, Monday 06:00 UTC

permissions:
  contents: read

jobs:
  image-scan:
    name: Image vulnerability scan
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
      - name: Extract image references
        id: images
        run: |
          images=$(grep -rh 'image:' k8s/ \
            | sed 's/.*image:[[:space:]]*//' \
            | grep -v '{{' \
            | sort -u \
            | tr '\n' ' ')
          echo "list=$images" >> "$GITHUB_OUTPUT"
      - name: Trivy image scan
        run: |
          mkdir -p "$HOME/.trivy-cache"
          failed=0
          for image in ${{ steps.images.outputs.list }}; do
            echo "::group::$image"
            report=$(docker run --rm -v "$HOME/.trivy-cache:/root/.cache" \
              aquasec/trivy:0.72.0 image \
              --severity HIGH,CRITICAL \
              --scanners vuln \
              --exit-code 0 \
              --quiet \
              "$image" || echo "scan failed for $image")
            echo "$report"
            if [ -n "$report" ]; then
              {
                echo "### \`$image\`"
                echo '```'
                echo "$report"
                echo '```'
              } >> "$GITHUB_STEP_SUMMARY"
            fi
            # fail the run (and trigger the scheduled-workflow notification) on CRITICALs only
            if ! docker run --rm -v "$HOME/.trivy-cache:/root/.cache" \
              aquasec/trivy:0.72.0 image \
              --severity CRITICAL \
              --scanners vuln \
              --exit-code 1 \
              --quiet \
              "$image" > /dev/null 2>&1; then
              failed=1
            fi
            echo "::endgroup::"
          done
          if [ "$failed" -eq 1 ]; then
            echo "CRITICAL vulnerabilities found — see step summary" >&2
            exit 1
          fi
