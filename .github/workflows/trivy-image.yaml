name: Trivy image scan

on:
  workflow_dispatch:
  schedule:
    - cron: '0 6 * * 1' # weekly, Monday 06:00 UTC

permissions:
  contents: read

jobs:
  image-scan:
    name: Image vulnerability scan
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7
      - name: Extract image references
        run: |
          grep -rh 'image:' k8s/ \
            | sed 's/.*image:[[:space:]]*//' \
            | tr -d '"' \
            | grep -E '^[a-z0-9.:/_-]+(:[A-Za-z0-9._-]+)?(@sha256:[a-f0-9]{64})?$' \
            | sort -u > images.txt
          echo "$(wc -l < images.txt) images to scan"
      - name: Trivy image scan
        run: |
          mkdir -p "$HOME/.trivy-cache"
          template='{{- range . -}}{{- range .Vulnerabilities -}}{{ .Severity }}|{{ .FixedVersion }}|{{ .VulnerabilityID }}|{{ .PkgName }}{{ "\n" }}{{ end }}{{ end }}'
          errored=0
          failed=0
          while read -r image; do
            echo "::group::$image"
            rows=$(docker run --rm -v "$HOME/.trivy-cache:/root/.cache" </dev/null \
              aquasec/trivy:0.72.0 image --scanners vuln --quiet \
              --format template --template "$template" "$image" 2>&1)
            if [ $? -ne 0 ]; then
              echo "$rows"
              echo "### \`$image\` — SCAN ERROR" >> "$GITHUB_STEP_SUMMARY"
              errored=1
              echo "::endgroup::"
              continue
            fi
            bad_rows=$(echo "$rows" | grep -E '^(HIGH|CRITICAL)\|')
            fixable_critical=$(echo "$rows" | grep -c -E '^CRITICAL\|[^|]+\|')
            echo "$bad_rows"
            echo "fixable CRITICAL: $fixable_critical"
            if [ -n "$bad_rows" ]; then
              {
                echo "### \`$image\`"
                echo '| Severity | Fixed | CVE | Package |'
                echo '|---|---|---|---|'
                echo "$bad_rows" | awk -F'|' '{printf "| %s | %s | %s | %s |\n", $1, ($2==""?"-":$2), $3, $4}'
              } >> "$GITHUB_STEP_SUMMARY"
            fi
            if [ "$fixable_critical" -gt 0 ]; then
              failed=1
            fi
            echo "::endgroup::"
          done < images.txt
          if [ "$errored" -eq 1 ]; then
            echo "one or more images failed to scan — see step summary" >&2
          fi
          if [ "$failed" -eq 1 ]; then
            echo "fixable CRITICAL vulnerabilities found — see step summary" >&2
          fi
          if [ "$errored" -eq 1 ] || [ "$failed" -eq 1 ]; then
            exit 1
          fi
