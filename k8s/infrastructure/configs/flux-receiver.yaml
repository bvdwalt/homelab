---
apiVersion: notification.toolkit.fluxcd.io/v1
kind: Receiver
metadata:
  name: gitea-receiver
  namespace: flux-system
spec:
  type: generic-hmac
  events:
    - push
  secretRef:
    name: flux-receiver-token
  resources:
    - apiVersion: source.toolkit.fluxcd.io/v1
      kind: GitRepository
      name: flux-system
      namespace: flux-system
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: webhook-proxy
  namespace: flux-system
spec:
  replicas: 1
  selector:
    matchLabels:
      app: webhook-proxy
  template:
    metadata:
      labels:
        app: webhook-proxy
    spec:
      containers:
        - name: socat
          image: alpine/socat:latest
          args:
            - TCP4-LISTEN:8080,fork,reuseaddr
            - TCP4:webhook-receiver.flux-system.svc.cluster.local:80
          ports:
            - containerPort: 8080
              hostPort: 31901
              protocol: TCP
