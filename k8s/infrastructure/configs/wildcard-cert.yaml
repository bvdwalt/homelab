---
# Wildcard certificate for *.greedo.net, stored in the traefik namespace.
# Traefik's TLSStore (see tlsstore.yaml) picks this up as the default
# certificate for all websecure IngressRoutes — no per-service cert needed.
apiVersion: cert-manager.io/v1
kind: Certificate
metadata:
  name: greedo-net-wildcard
  namespace: traefik
spec:
  secretName: greedo-net-wildcard-tls
  issuerRef:
    name: letsencrypt
    kind: ClusterIssuer
  dnsNames:
    - "*.greedo.net"
    - greedo.net
