apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: traefik
  namespace: traefik
spec:
  interval: 30m
  chart:
    spec:
      chart: traefik
      # renovate: registryUrl=https://traefik.github.io/charts
      version: "40.2.0"
      sourceRef:
        kind: HelmRepository
        name: traefik
        namespace: flux-system
      interval: 12h
  install:
    remediation:
      retries: 3
  upgrade:
    remediation:
      retries: 3
      strategy: rollback
  values:
    deployment:
      replicas: 1
    ports:
      web:
        port: 8000
        expose:
          default: true
        exposedPort: 80
        http:
          redirections:
            entryPoint:
              to: websecure
              scheme: https
              permanent: true
      websecure:
        port: 8443
        expose:
          default: true
        exposedPort: 443
    service:
      annotations:
        metallb.universe.tf/loadBalancerIPs: "10.13.1.160"
      spec:
        type: LoadBalancer
    ingressRoute:
      dashboard:
        enabled: false
    logs:
      general:
        level: ERROR
      access:
        enabled: true
    providers:
      kubernetesIngress:
        enabled: false
      kubernetesCRD:
        enabled: true
