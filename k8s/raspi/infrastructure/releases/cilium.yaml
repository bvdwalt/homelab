apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: cilium
  namespace: kube-system
spec:
  interval: 30m
  chart:
    spec:
      chart: cilium
      version: "1.19.x"
      sourceRef:
        kind: HelmRepository
        name: cilium
        namespace: flux-system
      interval: 12h
  install:
    remediation:
      retries: 3
  upgrade:
    remediation:
      retries: 3
  values:
    kubeProxyReplacement: true
    k8sServiceHost: 10.13.1.164
    k8sServicePort: 6443
    routingMode: native
    ipv4NativeRoutingCIDR: 10.42.0.0/16
    ipam:
      mode: kubernetes
    bpf:
      masquerade: true
    operator:
      replicas: 1
    hubble:
      enabled: true
      metrics:
        enableOpenMetrics: true
        enabled:
          - dns
          - drop
          - tcp
          - flow
          - port-distribution
          - httpV2
      relay:
        enabled: true
      ui:
        enabled: true
    prometheus:
      enabled: true
      serviceMonitor:
        enabled: true
