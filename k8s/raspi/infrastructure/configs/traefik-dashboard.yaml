apiVersion: traefik.io/v1alpha1
kind: IngressRoute
metadata:
  name: traefik-dashboard
  namespace: kube-system
spec:
  entryPoints:
    - websecure
  routes:
    - match: Host(`traefik-raspi.greedo.net`)
      kind: Rule
      services:
        - name: api@internal
          kind: TraefikService
  tls:
    secretName: greedo-net-wildcard-tls
