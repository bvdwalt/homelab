apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: infrastructure-releases
  namespace: flux-system
spec:
  interval: 10m
  timeout: 5m
  retryInterval: 2m
  path: ./k8s/raspi/infrastructure/releases
  prune: true
  wait: true
  sourceRef:
    kind: GitRepository
    name: flux-system
  dependsOn:
    - name: infrastructure-sources
    - name: infrastructure-secrets
