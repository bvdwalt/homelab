apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: speedtest-tracker
  namespace: flux-system
spec:
  interval: 10m
  releaseName: speedtest-tracker
  targetNamespace: speedtest-tracker
  install:
    createNamespace: true
  chart:
    spec:
      chart: ./k8s/charts/homelab-app
      sourceRef:
        kind: GitRepository
        name: flux-system
        namespace: flux-system
  values:
    image: lscr.io/linuxserver/speedtest-tracker:1.14.3@sha256:c3750c40948a9360000ce62d694da92e85584b4ab6d3d9a9d1432d76fa5e0726
    port: 80
    hostname: speedtest.greedo.net
    strategy: Recreate
    env:
      TZ: "Europe/Amsterdam"
      DISPLAY_TIMEZONE: "Europe/Amsterdam"
      SPEEDTEST_SCHEDULE: "0 * * * *"
    existingSecret: speedtest-tracker
    securityContext:
      enabled: false
    persistence:
      enabled: true
      size: 500Mi
      mountPath: /config
