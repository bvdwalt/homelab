apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: atuin
  namespace: flux-system
spec:
  interval: 10m
  releaseName: atuin
  targetNamespace: atuin
  install:
    createNamespace: true
  chart:
    spec:
      chart: ./k8s/charts/homelab-app
      sourceRef:
        kind: GitRepository
        name: flux-system
        namespace: flux-system
  values:
    image: ghcr.io/atuinsh/atuin:18.16.1@sha256:9d4d79507b51be6d292b218f5cc791d79ca0a72f51ab48f786b091bd6eafb39f
    port: 8888
    hostname: atuin.greedo.net
    args:
      - start
    env:
      ATUIN_HOST: "0.0.0.0"
      ATUIN_PORT: "8888"
      ATUIN_OPEN_REGISTRATION: "false"
      TZ: "Europe/Amsterdam"
    existingSecret: atuin
    persistence:
      enabled: true
      mountPath: /config
      storageClass: local-path
    securityContext:
      enabled: true
      runAsNonRoot: true
      runAsUser: 3013
      runAsGroup: 3013
