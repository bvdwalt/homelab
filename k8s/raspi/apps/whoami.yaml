apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: whoami
  namespace: flux-system
spec:
  interval: 10m
  releaseName: whoami
  targetNamespace: whoami
  install:
    createNamespace: true
  chart:
    spec:
      chart: ./k8s/charts/homelab-app
      sourceRef:
        kind: GitRepository
        name: flux-system
        namespace: flux-system
  values:
    image: traefik/whoami:v1.10.4
    port: 80
    hostname: whoami-raspi.greedo.net
    resources:
      requests:
        memory: 8Mi
      limits:
        memory: 32Mi
