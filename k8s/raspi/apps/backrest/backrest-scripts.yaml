  restore-config.py: |
    #!/usr/bin/env python3
    """Restore config.json from template on first run.

    Copies /scripts/config-template.json to /data/config.json if it does not
    exist, injecting RESTIC_PASSWORD from the environment.
    The sync.identity section is intentionally absent from the template —
    backrest generates a fresh identity on first startup.
    """
    import json
    import os
    from pathlib import Path

    CONFIG = Path("/data/config.json")
    TEMPLATE = Path("/scripts/config-template.json")

    if CONFIG.exists():
        print("config.json exists, skipping restore")
    else:
        config = json.loads(TEMPLATE.read_text())
        password = os.environ["RESTIC_PASSWORD"]
        for repo in config.get("repos", []):
            repo["password"] = password
        CONFIG.write_text(json.dumps(config, indent=2))
        print(f"Restored config.json ({len(config.get('repos', []))} repo(s))")

  extract-config.py: |
    #!/usr/bin/env python3
    """Print current backrest config with password blanked, ready to commit to git.

    Usage (inside backrest scripts container):
      python3 /scripts/extract-config.py

    Paste the output as config-template.json in backrest-scripts.yaml, then commit.
    The sync section is excluded — it contains a private key and regenerates on startup.
    """
    import json
    from pathlib import Path

    config = json.loads(Path("/data/config.json").read_text())
    for repo in config.get("repos", []):
        repo["password"] = ""
    config.pop("sync", None)
    print(json.dumps(config, indent=2))

  diff-summary.py: |
    #!/usr/bin/env python3
    """Summarize restic diff output grouped by app/PVC.

    Usage (inside backrest pod):
      python3 /scripts/diff-summary.py [-v] [repo-id]

    With no arguments, lists repos from /data/config.json and diffs the first one.
    Pass a repo id (from config.json) to target a specific repo.
    Set RESTIC_PASSWORD to override the password from config.json.
    """

    import json
    import os
    import re
    import subprocess
    import sys
    from collections import defaultdict
    from pathlib import Path

    CONFIG_FILE = Path("/data/config.json")


    def load_backrest_config():
        if not CONFIG_FILE.exists():
            return None
        return json.loads(CONFIG_FILE.read_text())


    def get_repo_env(repo_id=None):
        config = load_backrest_config()
        if not config:
            return None, None
        repos = config.get("repos", [])
        if not repos:
            return None, None
        if repo_id:
            repos = [r for r in repos if r.get("id") == repo_id]
            if not repos:
                print(f"Error: repo '{repo_id}' not found in config.json", file=sys.stderr)
                print(f"  Available: {[r.get('id') for r in config.get('repos', [])]}", file=sys.stderr)
                sys.exit(1)
        repo = repos[0]
        uri = repo.get("uri", "")
        password = os.environ.get("RESTIC_PASSWORD") or repo.get("password", "")
        return uri, password


    def parse_diff_line(line):
        match = re.match(r'^([M+\-])\s+(.+)$', line)
        return match.groups() if match else None


    def get_app_dir(path):
        parts = path.lstrip('/').split('/')
        if not parts:
            return 'other'

        # k3s local-path-provisioner: /pvcs/{name}_{namespace}_{pv-uid}/...
        # Extract namespace/pvc-name from the directory name
        if parts[0] == 'pvcs' and len(parts) >= 2:
            dir_name = parts[1]
            segments = dir_name.split('_')
            # Segments that aren't the PV UID (which starts with "pvc-") are name + namespace
            non_pv = [s for s in segments if not s.startswith('pvc-')]
            if len(non_pv) >= 2:
                return f"{non_pv[0]}/{non_pv[1]}"
            elif non_pv:
                return f"pvcs/{non_pv[0]}"
            return f"pvcs/{dir_name}"

        if len(parts) >= 2:
            return f"{parts[0]}/{parts[1]}"
        return parts[0]


    def parse_summary_line(line):
        if line.startswith('Files:'):
            match = re.search(r'(\d+)\s+new,\s+(\d+)\s+removed,\s+(\d+)\s+changed', line)
            if match:
                return {'new': int(match.group(1)), 'removed': int(match.group(2)), 'changed': int(match.group(3))}
        elif line.startswith('  Added:'):
            match = re.search(r'Added:\s+([\d.]+\s+\w+)', line)
            return {'added': match.group(1)} if match else None
        elif line.startswith('  Removed:'):
            match = re.search(r'Removed:\s+([\d.]+\s+\w+)', line)
            return {'data_removed': match.group(1)} if match else None
        return None


    def get_latest_snapshots(repo, env):
        try:
            result = subprocess.run(
                ['restic', '-r', repo, 'snapshots', '--json'],
                capture_output=True, text=True, check=True, env=env,
            )
            snaps = json.loads(result.stdout)
            plan_snaps = [s for s in snaps if any(t.startswith('plan:') for t in s.get('tags', []))]
            if len(plan_snaps) < 2:
                print(f"Error: only {len(plan_snaps)} plan snapshots found (need 2)", file=sys.stderr)
                sys.exit(1)
            return plan_snaps[-2], plan_snaps[-1]
        except subprocess.CalledProcessError as e:
            print(f"Error querying snapshots: {e.stderr}", file=sys.stderr)
            sys.exit(1)


    def run_restic_diff(repo, snap1, snap2, env):
        try:
            result = subprocess.run(
                ['restic', '-r', repo, 'diff', snap1, snap2],
                capture_output=True, text=True, check=True, env=env,
            )
            return result.stdout.strip().split('\n')
        except subprocess.CalledProcessError as e:
            print(f"Error running restic diff: {e.stderr}", file=sys.stderr)
            sys.exit(1)


    def main():
        verbose = '--verbose' in sys.argv or '-v' in sys.argv
        args = [a for a in sys.argv[1:] if a not in ('--verbose', '-v')]

        repo_id = args[0] if args else None
        repo_uri, password = get_repo_env(repo_id)

        if not repo_uri:
            print("Error: could not determine repo. Pass a repo id or check /data/config.json", file=sys.stderr)
            sys.exit(1)
        if not password:
            print("Error: RESTIC_PASSWORD not set and no password in config.json", file=sys.stderr)
            sys.exit(1)

        env = os.environ.copy()
        env['RESTIC_PASSWORD'] = password

        print(f"Repo: {repo_uri}", file=sys.stderr)
        snap1_data, snap2_data = get_latest_snapshots(repo_uri, env)
        snap1, snap2 = snap1_data['id'], snap2_data['id']
        print(f"Comparing {snap1[:8]} ({snap1_data['time'][:16]}) → {snap2[:8]} ({snap2_data['time'][:16]})\n", file=sys.stderr)

        lines = run_restic_diff(repo_uri, snap1, snap2, env)

        changes = defaultdict(lambda: {'new': 0, 'removed': 0, 'changed': 0})
        files_by_app = defaultdict(lambda: {'new': [], 'removed': [], 'changed': []})
        total_stats = {}

        for line in lines:
            parsed = parse_diff_line(line)
            if parsed:
                status, path = parsed
                app = get_app_dir(path)
                if status == '+':
                    changes[app]['new'] += 1
                    files_by_app[app]['new'].append(path)
                elif status == '-':
                    changes[app]['removed'] += 1
                    files_by_app[app]['removed'].append(path)
                elif status == 'M':
                    changes[app]['changed'] += 1
                    files_by_app[app]['changed'].append(path)
            summary = parse_summary_line(line)
            if summary:
                total_stats.update(summary)

        sorted_apps = sorted(changes.items(), key=lambda x: sum(x[1].values()), reverse=True)

        print("\n=== Snapshot Diff Summary ===\n")
        for app, counts in sorted_apps:
            total = sum(counts.values())
            print(f"{app:45} {counts['new']:4}+ {counts['removed']:4}- {counts['changed']:4}Δ  ({total:4} total)")

        print(f"\n{'─' * 80}")
        print(f"{'Overall':45} {total_stats.get('new', 0):4}+ {total_stats.get('removed', 0):4}- {total_stats.get('changed', 0):4}Δ")
        if 'added' in total_stats or 'data_removed' in total_stats:
            print(f"\nData: +{total_stats.get('added', '?'):>12} / -{total_stats.get('data_removed', '?'):>12}")

        if verbose:
            print(f"\n{'═' * 80}\n=== Detailed File Changes ===\n")
            for app, counts in sorted_apps:
                if sum(counts.values()) == 0:
                    continue
                print(f"{app}  ({counts['new']}+, {counts['removed']}-, {counts['changed']}Δ)")
                for ftype, files in [('Added', files_by_app[app]['new']),
                                      ('Removed', files_by_app[app]['removed']),
                                      ('Changed', files_by_app[app]['changed'])]:
                    if files:
                        print(f"  {ftype}:")
                        for f in sorted(files):
                            print(f"    {f}")
                print()


    if __name__ == '__main__':
        main()
