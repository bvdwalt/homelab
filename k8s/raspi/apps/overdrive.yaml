apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: overdrive
  namespace: flux-system
spec:
  interval: 10m
  releaseName: overdrive
  targetNamespace: overdrive
  install:
    createNamespace: true
  chart:
    spec:
      chart: ./k8s/charts/homelab-app
      sourceRef:
        kind: GitRepository
        name: flux-system
        namespace: flux-system
  values:
    image: robotwizard/overdrive:0.1.4@sha256:a93f930c227fc71d019f3fc8d6750f91d1c76dae94f69d5bfa09bd18dcc0dd8c
    port: 8080
    hostname: overdrive.greedo.net
    strategy: Recreate
    env:
      TZ: "Europe/Amsterdam"
    securityContext:
      enabled: false
    persistence:
      enabled: true
      size: 500Mi
      mountPath: /data
