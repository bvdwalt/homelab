apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: actual-budget
  namespace: flux-system
spec:
  interval: 10m
  releaseName: actual-budget
  targetNamespace: actual-budget
  install:
    createNamespace: true
  chart:
    spec:
      chart: ./k8s/charts/homelab-app
      sourceRef:
        kind: GitRepository
        name: flux-system
        namespace: flux-system
  values:
    image: docker.io/actualbudget/actual-server:26.6.0@sha256:1aeeb3985db55556e716dec25e08f6ce09308c2571b65cddbc6746ee6d5e0d45
    port: 5006
    hostname: budget.greedo.net
    strategy: Recreate
    env:
      TZ: "Europe/Amsterdam"
    persistence:
      enabled: true
      size: 100Mi
      mountPath: /data
