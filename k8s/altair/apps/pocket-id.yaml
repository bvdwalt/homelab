apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: pocket-id
  namespace: flux-system
spec:
  interval: 10m
  releaseName: pocket-id
  targetNamespace: pocket-id
  chart:
    spec:
      chart: ./k8s/charts/homelab-app
      sourceRef:
        kind: GitRepository
        name: flux-system
        namespace: flux-system
  values:
    image: ghcr.io/pocket-id/pocket-id:v2.9.0@sha256:9faea0cd0882d5464b5b5ed7ca96727ea8c3446ce468a6dd868c0097c0160621
    port: 1411
    hostname: pocketid.greedo.net
    strategy: Recreate
    priorityClassName: system-cluster-critical
    resources:
      requests:
        memory: 16Mi
      limits:
        memory: 64Mi
    livenessProbe:
      httpGet:
        path: /
        port: 1411
      initialDelaySeconds: 30
      periodSeconds: 30
      failureThreshold: 3
    env:
      APP_URL: "https://pocketid.greedo.net"
      TRUST_PROXY: "true"
      TZ: "Europe/Amsterdam"
    middlewares: []
    existingSecret: pocket-id-secrets
    persistence:
      enabled: true
      size: 100Mi
      mountPath: /app/data
    securityContext:
      enabled: true
      runAsNonRoot: true
      runAsUser: 3004
      runAsGroup: 3004
