apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: pocket-id
  namespace: flux-system
spec:
  interval: 10m
  releaseName: pocket-id
  targetNamespace: pocket-id
  install:
    createNamespace: true
  chart:
    spec:
      chart: ./k8s/charts/homelab-app
      sourceRef:
        kind: GitRepository
        name: flux-system
        namespace: flux-system
  values:
    image: ghcr.io/pocket-id/pocket-id:v2.8.0@sha256:a073640418b2cfc8587c488a7270580b3ab95cae2c543f5d64bbbe1fd7ccbae8
    port: 1411
    hostname: pocketid.greedo.net
    strategy: Recreate
    priorityClassName: system-cluster-critical
    resources:
      requests:
        memory: 16Mi
      limits:
        memory: 64Mi
    env:
      APP_URL: "https://pocketid.greedo.net"
      TRUST_PROXY: "true"
      TZ: "Europe/Amsterdam"
    middlewares: []
    existingSecret: pocket-id-secrets
    persistence:
      enabled: true
      size: 100Mi
      mountPath: /app/data
    securityContext:
      enabled: true
      runAsNonRoot: true
      runAsUser: 3004
      runAsGroup: 3004
