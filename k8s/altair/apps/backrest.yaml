apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: backrest
  namespace: flux-system
spec:
  interval: 10m
  releaseName: backrest
  targetNamespace: backrest
  install:
    createNamespace: false
  chart:
    spec:
      chart: ./k8s/charts/homelab-app
      sourceRef:
        kind: GitRepository
        name: flux-system
        namespace: flux-system
  values:
    image: ghcr.io/garethgeorge/backrest:v1.13.0
    strategy: Recreate
    resources:
      requests:
        memory: 16Mi
      limits:
        memory: 512Mi
    livenessProbe:
      httpGet:
        path: /
        port: 9898
      initialDelaySeconds: 15
      periodSeconds: 30
      failureThreshold: 3
    port: 9898
    hostname: backrest.greedo.net
    env:
      BACKREST_PORT: "0.0.0.0:9898"
      BACKREST_DATA: /data
      BACKREST_CONFIG: /data/config.json
      XDG_CACHE_HOME: /data/cache
      TZ: Europe/Amsterdam
    existingSecret: backrest
    persistence:
      enabled: true
      size: 1Gi
      mountPath: /data
    securityContext:
      capabilities:
        add: [DAC_READ_SEARCH]
    existingConfigMap: backrest-scripts
    configKeys: [excludes.txt, sync-excludes.py, diff-summary.py, pg-dump.sh, pre-backup.sh, post-backup.sh]
    configMountPath: /scripts
    extraContainers:
      - name: scripts
        image: postgres:18-alpine
        command: [sh, -c, "apk add --no-cache restic rclone python3 curl && sleep infinity"]
        envFrom:
          - secretRef:
              name: backrest
          - secretRef:
              name: postgresql-superuser-backrest
              optional: true
        volumeMounts:
          - name: data
            mountPath: /data
          - name: config
            mountPath: /scripts
    initContainers:
      - name: sync-excludes
        image: python:3.14-alpine
        command: [python3, /scripts/sync-excludes.py]
        volumeMounts:
          - name: data
            mountPath: /data
          - name: config
            mountPath: /scripts
    hostPaths:
      - name: pvcs
        hostPath: /var/lib/rancher/k3s/storage
        mountPath: /pvcs
        readOnly: true
