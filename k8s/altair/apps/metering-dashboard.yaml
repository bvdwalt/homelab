apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: metering-dashboard
  namespace: flux-system
spec:
  interval: 10m
  releaseName: metering-dashboard
  targetNamespace: metering
  install:
    createNamespace: true
  chart:
    spec:
      chart: ./k8s/charts/homelab-app
      sourceRef:
        kind: GitRepository
        name: flux-system
        namespace: flux-system
  values:
    image: robotwizard/metering-dashboard:0.2.0@sha256:6ce901d953b7815142952abb4e2ac6fb7acc242a8e0185963434a364e838e852
    port: 80
    hostname: metering.greedo.net
    resources:
      requests:
        memory: 8Mi
      limits:
        memory: 32Mi
    livenessProbe:
      httpGet:
        path: /
        port: 80
      initialDelaySeconds: 15
      periodSeconds: 30
      failureThreshold: 3
    env:
      VITE_API_HOST: "https://metering-api.greedo.net"
      TZ: "Europe/Amsterdam"
    securityContext:
      enabled: false
