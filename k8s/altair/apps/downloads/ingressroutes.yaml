---
apiVersion: traefik.io/v1alpha1
kind: IngressRoute
metadata:
  name: radarr
  namespace: downloads
spec:
  entryPoints: [websecure]
  routes:
    - kind: Rule
      match: Host(`radarr.greedo.net`)
      middlewares:
        - name: oidc-auth
          namespace: kube-system
      services:
        - name: radarr
          port: 80
    # API-key clients (seerr, homepage): no OIDC, auth via X-Api-Key
    - kind: Rule
      match: Host(`radarr.greedo.net`) && PathPrefix(`/api`)
      services:
        - name: radarr
          port: 80
  tls: {}
