apiVersion: apps/v1
kind: Deployment
metadata:
  name: downloads
  namespace: downloads
spec:
  replicas: 1
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app: downloads
  template:
    metadata:
      labels:
        app: downloads
    spec:
      initContainers:
        - name: init-slskd-dirs
          image: busybox:1.38@sha256:fd8d9aa63ba2f0982b5304e1ee8d3b90a210bc1ffb5314d980eb6962f1a9715d
          command: ["mkdir", "-p", "/downloads/slskd"]
          volumeMounts:
            - name: downloads
              mountPath: /downloads
      containers:
        - name: gluetun
          image: qmcgaw/gluetun:v3.41.1@sha256:1a5bf4b4820a879cdf8d93d7ef0d2d963af56670c9ebff8981860b6804ebc8ab
          securityContext:
            capabilities:
              add: ["NET_ADMIN"]
              drop: ["ALL"]
          envFrom:
            - secretRef:
                name: downloads-vpn
          env:
            - name: VPN_SERVICE_PROVIDER
              value: mullvad
            - name: VPN_TYPE
              value: wireguard
            - name: SERVER_COUNTRIES
              value: Netherlands
            - name: WIREGUARD_ADDRESSES
              value: 10.74.116.211/32
            - name: FIREWALL_INPUT_PORTS
              value: "7878,8989,8686,9696,6767,8191,8082,6868,8080,51413,5030,50300"
            - name: FIREWALL_OUTBOUND_SUBNETS
              value: "10.42.0.0/16,10.43.0.0/16,10.13.1.0/24"
          volumeMounts:
            - name: tun
              mountPath: /dev/net/tun
          readinessProbe:
            exec:
              command: ["/bin/sh", "-c", "wget -q -O /dev/null http://127.0.0.1:8000/v1/publicip/ip"]
            initialDelaySeconds: 10
            periodSeconds: 10
            failureThreshold: 6
          resources:
            requests:
              cpu: 10m
              memory: 64Mi
            limits:
              memory: 256Mi

        - name: radarr
          image: lscr.io/linuxserver/radarr:6.2.1@sha256:1e95b5c13fe015361a9ae1c4d99fc2336816790aaea60fa74b2ffebe076a69e0
          env:
            - name: TZ
              value: Europe/Amsterdam
            - name: PUID
              value: "1000"
            - name: PGID
              value: "1000"
          volumeMounts:
            - name: radarr-config
              mountPath: /config
            - name: downloads
              mountPath: /downloads
            - name: movies
              mountPath: /movies
          readinessProbe:
            httpGet:
              path: /ping
              port: 7878
            initialDelaySeconds: 20
            periodSeconds: 10
            failureThreshold: 6
          resources:
            requests:
              cpu: 10m
              memory: 192Mi
            limits:
              memory: 512Mi

        - name: sonarr
          image: lscr.io/linuxserver/sonarr:4.0.19@sha256:fbb15bb4fb14d1ffe017f6be0e3fed8f1b300e4687e329767da0b61f36ba1eed
          env:
            - name: TZ
              value: Europe/Amsterdam
            - name: PUID
              value: "1000"
            - name: PGID
              value: "1000"
          volumeMounts:
            - name: sonarr-config
              mountPath: /config
            - name: downloads
              mountPath: /downloads
            - name: shows
              mountPath: /shows
          readinessProbe:
            httpGet:
              path: /ping
              port: 8989
            initialDelaySeconds: 20
            periodSeconds: 10
            failureThreshold: 6
          resources:
            requests:
              cpu: 10m
              memory: 192Mi
            limits:
              memory: 512Mi

        - name: lidarr
          image: lscr.io/linuxserver/lidarr:3.1.0.4875-ls20@sha256:7aa2f4d4ac373a989a6e773d4c43c6a81bccf45cdf2598f74f1dbf6cede8e467
          env:
            - name: TZ
              value: Europe/Amsterdam
            - name: PUID
              value: "1000"
            - name: PGID
              value: "1000"
          volumeMounts:
            - name: lidarr-config
              mountPath: /config
            - name: downloads
              mountPath: /downloads
            - name: music
              mountPath: /music
          readinessProbe:
            httpGet:
              path: /ping
              port: 8686
            initialDelaySeconds: 20
            periodSeconds: 10
            failureThreshold: 6
          resources:
            requests:
              cpu: 10m
              memory: 192Mi
            limits:
              memory: 512Mi

        - name: bazarr
          image: lscr.io/linuxserver/bazarr:1.5.6@sha256:aaaa087af75a73b7ac765dcc5d748874cfafdb93c23ec9f64fbb481dea291b23
          env:
            - name: TZ
              value: Europe/Amsterdam
            - name: PUID
              value: "1000"
            - name: PGID
              value: "1000"
          volumeMounts:
            - name: bazarr-config
              mountPath: /config
            - name: movies
              mountPath: /movies
            - name: shows
              mountPath: /shows
          readinessProbe:
            httpGet:
              path: /
              port: 6767
            initialDelaySeconds: 20
            periodSeconds: 10
            failureThreshold: 6
          resources:
            requests:
              cpu: 10m
              memory: 192Mi
            limits:
              memory: 512Mi

        - name: prowlarr
          image: lscr.io/linuxserver/prowlarr:2.4.0@sha256:3950b5e48cf4ba9dab78fe14038dd7f062e66b7b4ab368b02c94a13f6a3dae9f
          env:
            - name: TZ
              value: Europe/Amsterdam
            - name: PUID
              value: "1000"
            - name: PGID
              value: "1000"
          volumeMounts:
            - name: prowlarr-config
              mountPath: /config
          readinessProbe:
            httpGet:
              path: /ping
              port: 9696
            initialDelaySeconds: 20
            periodSeconds: 10
            failureThreshold: 6
          resources:
            requests:
              cpu: 10m
              memory: 192Mi
            limits:
              memory: 512Mi

        - name: qbittorrent
          image: lscr.io/linuxserver/qbittorrent:5.2.2@sha256:163f3384db6cba9f68eaa83ca5f4209298b6029ba2d07b5e67562d0715baf5b9
          env:
            - name: TZ
              value: Europe/Amsterdam
            - name: PUID
              value: "1000"
            - name: PGID
              value: "1000"
            - name: WEBUI_PORT
              value: "8082"
          volumeMounts:
            - name: qbittorrent-config
              mountPath: /config
            - name: downloads
              mountPath: /downloads
          readinessProbe:
            httpGet:
              path: /
              port: 8082
            initialDelaySeconds: 20
            periodSeconds: 10
            failureThreshold: 6
          resources:
            requests:
              cpu: 25m
              memory: 384Mi
            limits:
              memory: 1Gi

        - name: flaresolverr
          image: ghcr.io/flaresolverr/flaresolverr:v3.5.0@sha256:139dfee1c6f89249c8d665d1333a42e8ec74ec0a86bc6bb1c8461e10d3a66a47
          securityContext:
            capabilities:
              drop: ["ALL"]
          env:
            - name: TZ
              value: Europe/Amsterdam
            - name: LOG_LEVEL
              value: info
          readinessProbe:
            httpGet:
              path: /health
              port: 8191
            initialDelaySeconds: 10
            periodSeconds: 10
            failureThreshold: 6
          resources:
            requests:
              cpu: 10m
              memory: 192Mi
            limits:
              memory: 1Gi

        - name: profilarr
          image: santiagosayshey/profilarr:v1.1.5@sha256:8033e9c6d6995f37625afeb93d7020e99566f549ae83b65f1db7e11048952d0f
          env:
            - name: TZ
              value: Europe/Amsterdam
          volumeMounts:
            - name: profilarr-config
              mountPath: /config
          readinessProbe:
            httpGet:
              path: /
              port: 6868
            initialDelaySeconds: 10
            periodSeconds: 10
            failureThreshold: 6
          resources:
            requests:
              cpu: 10m
              memory: 64Mi
            limits:
              memory: 256Mi

        - name: music-grabber
          image: g33kphr33k/musicgrabber:2.9.5@sha256:5dcbad45ad0d822caed2eb506a73df23a394fb30b0399f5d4aab4696add34f3e
          env:
            - name: TZ
              value: Europe/Amsterdam
            - name: PUID
              value: "1000"
            - name: PGID
              value: "1000"
            - name: MUSIC_DIR
              value: /music
            - name: DB_PATH
              value: music_grabber.db
            - name: ENABLE_MUSICBRAINZ
              value: "true"
            - name: DEFAULT_CONVERT_TO_FLAC
              value: "true"
          volumeMounts:
            - name: music-grabber-data
              mountPath: /data
            - name: music
              mountPath: /music
          readinessProbe:
            httpGet:
              path: /
              port: 8080
            initialDelaySeconds: 10
            periodSeconds: 10
            failureThreshold: 6
          resources:
            requests:
              cpu: 10m
              memory: 128Mi
            limits:
              memory: 1Gi

        - name: slskd
          image: slskd/slskd:0.25.1@sha256:ab9ed50e028b524cefdb7c1dd8ebca368a076e18441ee8ac2326473eb850b4c3
          securityContext:
            capabilities:
              drop: ["ALL"]
          envFrom:
            - secretRef:
                name: slskd-credentials
          env:
            - name: SLSKD_APP_DIR
              value: /data
            - name: SLSKD_DOWNLOADS_DIR
              value: /downloads/slskd
            - name: SLSKD_MUSIC_DIR
              value: /music
            - name: SLSKD_SLSK_LISTEN_PORT
              value: "50300"
            - name: SLSKD_HTTP_PORT
              value: "5030"
            - name: SLSKD_REMOTE_CONFIGURATION
              value: "true"
            - name: TZ
              value: Europe/Amsterdam
          volumeMounts:
            - name: slskd-data
              mountPath: /data
            - name: downloads
              mountPath: /downloads
            - name: music
              mountPath: /music
          readinessProbe:
            httpGet:
              path: /
              port: 5030
            initialDelaySeconds: 15
            periodSeconds: 10
            failureThreshold: 6
          resources:
            requests:
              cpu: 10m
              memory: 128Mi
            limits:
              memory: 512Mi

      volumes:
        - name: tun
          hostPath:
            path: /dev/net/tun
        - name: radarr-config
          persistentVolumeClaim:
            claimName: radarr-config
        - name: sonarr-config
          persistentVolumeClaim:
            claimName: sonarr-config
        - name: lidarr-config
          persistentVolumeClaim:
            claimName: lidarr-config
        - name: bazarr-config
          persistentVolumeClaim:
            claimName: bazarr-config
        - name: prowlarr-config
          persistentVolumeClaim:
            claimName: prowlarr-config
        - name: qbittorrent-config
          persistentVolumeClaim:
            claimName: qbittorrent-config
        - name: profilarr-config
          persistentVolumeClaim:
            claimName: profilarr-config
        - name: music-grabber-data
          persistentVolumeClaim:
            claimName: music-grabber-data
        - name: downloads
          hostPath:
            path: /mnt/downloads
        - name: shows
          hostPath:
            path: /mnt/media/shows
        - name: movies
          hostPath:
            path: /mnt/media/movies
        - name: music
          hostPath:
            path: /mnt/media/music
        - name: slskd-data
          persistentVolumeClaim:
            claimName: slskd-data
