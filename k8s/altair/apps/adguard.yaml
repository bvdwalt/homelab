apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: adguard
  namespace: flux-system
spec:
  interval: 10m
  releaseName: adguard
  targetNamespace: adguard
  install:
    createNamespace: true
  chart:
    spec:
      chart: ./k8s/charts/homelab-app
      sourceRef:
        kind: GitRepository
        name: flux-system
        namespace: flux-system
  values:
    image: adguard/adguardhome:v0.107.77
    port: 8080
    hostname: adguard.greedo.net
    strategy: Recreate
    readinessProbe:
      httpGet:
        path: /
        port: 8080
      initialDelaySeconds: 5
      periodSeconds: 5
      failureThreshold: 3
    hostNetwork: true
    args:
      - --no-check-update
      - --web-addr
      - 0.0.0.0:8080
      - --config
      - /data/conf/AdGuardHome.yaml
      - --work-dir
      - /data/work
    env:
      TZ: Europe/Amsterdam
    persistence:
      enabled: true
      mountPath: /data
      size: 1Gi
    existingConfigMap: adguard-config
    configKeys:
      - AdGuardHome.yaml
    configMountPath: /config-seed
    initContainers:
      - name: config-seed
        image: busybox
        command:
          - sh
          - -c
          - |
            if [ ! -f /data/conf/AdGuardHome.yaml ]; then
              mkdir -p /data/conf
              cp /config-seed/AdGuardHome.yaml /data/conf/AdGuardHome.yaml
              echo "Config seeded from ConfigMap"
            else
              echo "Config already exists, skipping seed"
            fi
        volumeMounts:
          - name: data
            mountPath: /data
          - name: config
            mountPath: /config-seed
    securityContext:
      enabled: true
      runAsNonRoot: false
      capabilities:
        add:
          - NET_BIND_SERVICE
