apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: metering-api
  namespace: flux-system
spec:
  interval: 10m
  releaseName: metering-api
  targetNamespace: metering
  install:
    createNamespace: true
  chart:
    spec:
      chart: ./k8s/charts/homelab-app
      sourceRef:
        kind: GitRepository
        name: flux-system
        namespace: flux-system
  values:
    image: robotwizard/metering-api:v0.10.0@sha256:1a54707271cc25034af47e50c857c9594c7c2034fe46974c280a7d664449020b
    port: 8080
    hostname: metering-api.greedo.net
    resources:
      requests:
        memory: 8Mi
      limits:
        memory: 32Mi
    readinessProbe:
      tcpSocket:
        port: 8080
      initialDelaySeconds: 10
      periodSeconds: 10
      failureThreshold: 6
    livenessProbe:
      tcpSocket:
        port: 8080
      initialDelaySeconds: 15
      periodSeconds: 30
      failureThreshold: 3
    env:
      POSTGRES_HOST: "postgresql.postgresql.svc.cluster.local"
      POSTGRES_USER: "metering"
      POSTGRES_DB: "data"
      TZ: "Europe/Amsterdam"
    middlewares: []
    existingSecret: metering-secrets
