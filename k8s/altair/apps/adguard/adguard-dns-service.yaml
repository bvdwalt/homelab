---
apiVersion: v1
kind: Service
metadata:
  name: adguard-dns
  namespace: adguard
spec:
  type: LoadBalancer
  loadBalancerClass: io.cilium/node
  externalTrafficPolicy: Local
  selector:
    app.kubernetes.io/name: adguard
  ports:
    - name: dns-udp
      port: 53
      targetPort: 53
      protocol: UDP
    - name: dns-tcp
      port: 53
      targetPort: 53
      protocol: TCP
---
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: adguard
  namespace: adguard
spec:
  podSelector: {}
  policyTypes:
    - Ingress
  ingress:
    # DNS: LAN + all cluster workloads
    - ports:
        - port: 53
          protocol: UDP
        - port: 53
          protocol: TCP
    # admin UI: Traefik + glance dns-stats widget
    - from:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: kube-system
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: glance
      ports:
        - port: 8080
