apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
resources:
  - adguard.yaml
  - adguard.sops.yaml
  - adguard-dns-service.yaml
configMapGenerator:
  - name: adguard-config
    namespace: adguard
    options:
      disableNameSuffixHash: true
    files:
      - adguard-config/AdGuardHome.yaml
