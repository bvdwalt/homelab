apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: adguard
  namespace: flux-system
spec:
  interval: 10m
  releaseName: adguard
  targetNamespace: adguard
  chart:
    spec:
      chart: ./k8s/charts/homelab-app
      sourceRef:
        kind: GitRepository
        name: flux-system
        namespace: flux-system
  values:
    image: adguard/adguardhome:v0.107.77@sha256:a8e81f370e086a9fa8c8a9f36dfe0222a8b1439541a4f39bc90aa360fce54cab
    port: 8080
    hostname: adguard.greedo.net
    strategy: Recreate
    priorityClassName: system-cluster-critical
    resources:
      requests:
        memory: 128Mi
      limits:
        memory: 1Gi
    readinessProbe:
      httpGet:
        path: /
        port: 8080
      initialDelaySeconds: 5
      periodSeconds: 5
      failureThreshold: 3
    livenessProbe:
      httpGet:
        path: /
        port: 8080
      initialDelaySeconds: 30
      periodSeconds: 30
      failureThreshold: 3
    args:
      - --no-check-update
      - --web-addr
      - 0.0.0.0:8080
      - --config
      - /data/conf/AdGuardHome.yaml
      - --work-dir
      - /data/work
    env:
      TZ: Europe/Amsterdam
    persistence:
      enabled: true
      mountPath: /data
      size: 1Gi
    existingConfigMap: adguard-config
    configKeys:
      - AdGuardHome.yaml
    configMountPath: /config-seed
    existingSecret: adguard
    initContainers:
      - name: config-seed
        image: busybox:1.38.0@sha256:fd8d9aa63ba2f0982b5304e1ee8d3b90a210bc1ffb5314d980eb6962f1a9715d
        command:
          - sh
          - -c
          - |
            if [ ! -f /data/conf/AdGuardHome.yaml ]; then
              mkdir -p /data/conf
              cp /config-seed/AdGuardHome.yaml /data/conf/AdGuardHome.yaml
              echo "Config seeded from ConfigMap"
            else
              echo "Config already exists, skipping seed"
            fi
            sed -i "s|password: .*|password: ${ADGUARD_PASSWORD_HASH}|" /data/conf/AdGuardHome.yaml
            echo "Password updated from secret"
        envFrom:
          - secretRef:
              name: adguard
        volumeMounts:
          - name: data
            mountPath: /data
          - name: config
            mountPath: /config-seed
    securityContext:
      enabled: true
      runAsNonRoot: false
      capabilities:
        add:
          - NET_BIND_SERVICE
