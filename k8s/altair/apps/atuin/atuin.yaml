apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: atuin
  namespace: flux-system
spec:
  interval: 10m
  releaseName: atuin
  targetNamespace: atuin
  chart:
    spec:
      chart: ./k8s/charts/homelab-app
      sourceRef:
        kind: GitRepository
        name: flux-system
        namespace: flux-system
  values:
    image: ghcr.io/atuinsh/atuin:18.17.1@sha256:b2567e0d80a5622dba8d6c5319b198a94ef5166003c2559b91a5406ac688aac7
    port: 8888
    hostname: atuin.greedo.net
    args:
      - start
    env:
      ATUIN_HOST: "0.0.0.0"
      ATUIN_PORT: "8888"
      ATUIN_OPEN_REGISTRATION: "false"
      TZ: "Europe/Amsterdam"
    resources:
      requests:
        memory: 8Mi
      limits:
        memory: 64Mi
    readinessProbe:
      tcpSocket:
        port: 8888
      initialDelaySeconds: 10
      periodSeconds: 10
      failureThreshold: 6
    livenessProbe:
      tcpSocket:
        port: 8888
      initialDelaySeconds: 15
      periodSeconds: 30
      failureThreshold: 3
    middlewares: []
    existingSecret: atuin
    persistence:
      enabled: true
      mountPath: /config
    securityContext:
      enabled: true
      runAsNonRoot: true
      runAsUser: 3013
      runAsGroup: 3013
