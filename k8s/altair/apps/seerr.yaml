apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: seerr
  namespace: flux-system
spec:
  interval: 10m
  releaseName: seerr
  targetNamespace: seerr
  install:
    createNamespace: true
  chart:
    spec:
      chart: ./k8s/charts/homelab-app
      sourceRef:
        kind: GitRepository
        name: flux-system
        namespace: flux-system
  values:
    image: ghcr.io/seerr-team/seerr:v3.3.0
    port: 5055
    hostname: seerr.greedo.net
    strategy: Recreate
    resources:
      requests:
        memory: 128Mi
      limits:
        memory: 384Mi
    livenessProbe:
      httpGet:
        path: /
        port: 5055
      initialDelaySeconds: 30
      periodSeconds: 30
      failureThreshold: 3
    env:
      TZ: Europe/Amsterdam
    persistence:
      enabled: true
      mountPath: /app/config
      size: 1Gi
