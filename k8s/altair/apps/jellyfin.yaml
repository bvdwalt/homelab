apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: jellyfin
  namespace: flux-system
spec:
  interval: 10m
  releaseName: jellyfin
  targetNamespace: jellyfin
  install:
    createNamespace: true
  chart:
    spec:
      chart: ./k8s/charts/homelab-app
      sourceRef:
        kind: GitRepository
        name: flux-system
        namespace: flux-system
  values:
    image: jellyfin/jellyfin:10.11.11@sha256:0b901391a662862eddb5dc55d244d7883cbb6236ef5b9a6ea82abc78a89819f0
    port: 8096
    hostname: jellyfin.greedo.net
    strategy: Recreate
    resources:
      requests:
        memory: 512Mi
      limits:
        memory: 4Gi
    readinessProbe:
      httpGet:
        path: /health
        port: 8096
      initialDelaySeconds: 30
      periodSeconds: 10
      failureThreshold: 6
    livenessProbe:
      httpGet:
        path: /
        port: 8096
      initialDelaySeconds: 60
      periodSeconds: 30
      failureThreshold: 3
    env:
      TZ: Europe/Amsterdam
      JELLYFIN_CONFIG_DIR: /config
      JELLYFIN_DATA_DIR: /config/data
      JELLYFIN_CACHE_DIR: /config/cache
      JELLYFIN_LOG_DIR: /config/log
    persistence:
      enabled: true
      mountPath: /config
      size: 10Gi
    hostPaths:
      - name: dri
        hostPath: /dev/dri
        mountPath: /dev/dri
      - name: shows
        hostPath: /mnt/media/shows
        mountPath: /shows
      - name: movies
        hostPath: /mnt/media/movies
        mountPath: /movies
      - name: music
        hostPath: /mnt/media/music
        mountPath: /music
    middlewares: []
    securityContext:
      enabled: true
      privileged: true
      runAsUser: 0
