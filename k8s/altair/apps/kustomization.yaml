apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
resources:
  - whoami.yaml
  - adguard.yaml
  - adguard.sops.yaml
  - jellyfin.yaml
  - seerr.yaml
  - navidrome.yaml
  - downloads
  - postgresql
  - gitea
  - backrest.yaml
  - backrest-scripts.yaml
  - monitoring
  - it-tools.yaml
  - metering-dashboard.yaml
  - metering-api.yaml
  - actual-budget.yaml
  - cullarr.yaml
  - homepage.yaml
  - pocket-id.yaml
  - atuin.yaml
  - overdrive.yaml
  - vaultwarden.yaml
  - glance.yaml
configMapGenerator:
  - name: homepage-config
    namespace: homepage
    options:
      disableNameSuffixHash: true
    files:
      - homepage-config/settings.yaml
      - homepage-config/bookmarks.yaml
      - homepage-config/widgets.yaml
      - homepage-config/services.yaml
      - homepage-config/kubernetes.yaml
      - homepage-config/docker.yaml
      - homepage-config/custom.css
      - homepage-config/custom.js
  - name: glance-config
    namespace: glance
    options:
      disableNameSuffixHash: true
    files:
      - glance-config/glance.yaml
  - name: adguard-config
    namespace: adguard
    options:
      disableNameSuffixHash: true
    files:
      - adguard-config/AdGuardHome.yaml
