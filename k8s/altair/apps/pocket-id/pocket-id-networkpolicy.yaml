apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: pocket-id
  namespace: pocket-id
spec:
  podSelector: {}
  policyTypes:
    - Ingress
  ingress:
    # Traefik (kube-system): user traffic and the oidc-auth plugin's
    # token/userinfo calls both arrive via the ingress
    - from:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: kube-system
      ports:
        - port: 1411
