apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: palimpsest
  namespace: flux-system
spec:
  releaseName: palimpsest
  targetNamespace: palimpsest
  values:
    image: ghcr.io/bvdwalt/palimpsest:0.5.0@sha256:fad785a7b4a8542c2ccb9acbb437e6cb50279b9aeb93d1e3062d9277c4cdb76c
    port: 8080
    hostname: notes.greedo.net
    resources:
      requests:
        memory: 32Mi
      limits:
        memory: 128Mi
    livenessProbe:
      httpGet:
        path: /
        port: 8080
      initialDelaySeconds: 15
      periodSeconds: 30
      failureThreshold: 3
    persistence:
      enabled: true
      size: 500Mi
      mountPath: /data
    securityContext:
      enabled: true
      runAsNonRoot: true
      runAsUser: 1000
      runAsGroup: 1000
