apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: prometheus
  namespace: flux-system
spec:
  interval: 30m
  releaseName: prometheus
  targetNamespace: monitoring
  install:
    createNamespace: false
    remediation:
      retries: 3
  upgrade:
    remediation:
      retries: 3
  chart:
    spec:
      chart: kube-prometheus-stack
      version: "86.x"
      sourceRef:
        kind: HelmRepository
        name: prometheus-community
        namespace: flux-system
      interval: 12h
  values:
    alertmanager:
      enabled: true
      alertmanagerSpec:
        secrets:
          - healthchecks
        resources:
          requests:
            cpu: 10m
            memory: 64Mi
          limits:
            memory: 256Mi
      config:
        route:
          receiver: ntfy
          group_by: ["namespace", "alertname"]
          group_wait: 30s
          group_interval: 5m
          repeat_interval: 12h
          routes:
            - receiver: healthchecks
              matchers:
                - alertname = Watchdog
              group_wait: 0s
              group_interval: 5m
              repeat_interval: 5m
        receivers:
          - name: ntfy
            webhook_configs:
              - url: http://ntfy-alertmanager.monitoring.svc.cluster.local:8080
                send_resolved: true
          - name: healthchecks
            webhook_configs:
              - url_file: /etc/alertmanager/secrets/healthchecks/ping-url
                send_resolved: false

    kubeEtcd:
      enabled: false

    kubeScheduler:
      enabled: false

    kubeControllerManager:
      enabled: false

    kubeProxy:
      enabled: false

    grafana:
      adminUser: ""
      adminPassword: ""
      admin:
        existingSecret: grafana-admin
        userKey: admin-user
        passwordKey: admin-password
      ingress:
        enabled: false
      persistence:
        enabled: true
        size: 1Gi
      defaultDashboardsTimezone: Europe/Amsterdam

    prometheus:
      prometheusSpec:
        retention: 30d
        storageSpec:
          volumeClaimTemplate:
            spec:
              accessModes: [ReadWriteOnce]
              resources:
                requests:
                  storage: 20Gi

    nodeExporter:
      enabled: true

    kubeStateMetrics:
      enabled: true
