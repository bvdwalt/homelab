apiVersion: traefik.io/v1alpha1
kind: IngressRoute
metadata:
  name: grafana
  namespace: monitoring
spec:
  entryPoints:
    - websecure
  routes:
    - match: Host(`grafana.greedo.net`)
      kind: Rule
      services:
        - name: prometheus-grafana
          port: 80
  tls:
    secretName: greedo-net-wildcard-tls
