apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: infrastructure-sources
  namespace: flux-system
spec:
  interval: 10m
  timeout: 5m
  retryInterval: 2m
  path: ./k8s/altair/infrastructure/sources
  prune: true
  wait: true
  sourceRef:
    kind: GitRepository
    name: flux-system
