apiVersion: kustomize.config.k8s.io/v1alpha1
kind: Component
patches:
  - target:
      kind: HelmRelease
    patch: |-
      apiVersion: helm.toolkit.fluxcd.io/v2
      kind: HelmRelease
      metadata:
        name: placeholder
        namespace: flux-system
      spec:
        interval: 10m
        chart:
          spec:
            chart: ./k8s/charts/homelab-app
            sourceRef:
              kind: GitRepository
              name: flux-system
              namespace: flux-system
        install:
          remediation:
            retries: 3
        upgrade:
          remediation:
            retries: 3
