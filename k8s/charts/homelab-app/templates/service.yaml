apiVersion: v1
kind: Service
metadata:
  name: {{ .Release.Name }}
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "homelab-app.labels" . | nindent 4 }}
spec:
  selector:
    {{- include "homelab-app.selectorLabels" . | nindent 4 }}
  ports:
    - port: 80
      targetPort: {{ .Values.port }}
