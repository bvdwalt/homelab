apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ .Release.Name }}
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "homelab-app.labels" . | nindent 4 }}
spec:
  replicas: 1
  selector:
    matchLabels:
      {{- include "homelab-app.selectorLabels" . | nindent 6 }}
  strategy:
    type: {{ .Values.strategy }}
    {{- if eq .Values.strategy "RollingUpdate" }}
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
    {{- end }}
  template:
    metadata:
      labels:
        {{- include "homelab-app.selectorLabels" . | nindent 8 }}
    spec:
      {{- if .Values.hostNetwork }}
      hostNetwork: true
      dnsPolicy: ClusterFirstWithHostNet
      {{- end }}
      {{- if .Values.initContainers }}
      initContainers:
        {{- toYaml .Values.initContainers | nindent 8 }}
      {{- end }}
      containers:
        - name: {{ .Release.Name }}
          image: {{ .Values.image }}
          {{- if .Values.args }}
          args:
            {{- toYaml .Values.args | nindent 12 }}
          {{- end }}
          ports:
            - containerPort: {{ .Values.port }}
          {{- if .Values.env }}
          env:
            {{- range $key, $val := .Values.env }}
            - name: {{ $key }}
              value: {{ $val | quote }}
            {{- end }}
          {{- end }}
          {{- if .Values.existingSecret }}
          envFrom:
            - secretRef:
                name: {{ .Values.existingSecret }}
          {{- end }}
          {{- if .Values.securityContext.enabled }}
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop: ["ALL"]
              {{- if .Values.securityContext.capabilities.add }}
              add: {{ toJson .Values.securityContext.capabilities.add }}
              {{- end }}
            seccompProfile:
              type: RuntimeDefault
            {{- if .Values.securityContext.runAsNonRoot }}
            runAsNonRoot: true
            runAsUser: {{ .Values.securityContext.runAsUser }}
            runAsGroup: {{ .Values.securityContext.runAsGroup }}
            {{- end }}
          {{- end }}
          {{- if or .Values.persistence.enabled .Values.configFiles .Values.existingConfigMap .Values.hostPaths }}
          volumeMounts:
            {{- if .Values.persistence.enabled }}
            - name: data
              mountPath: {{ .Values.persistence.mountPath }}
            {{- end }}
            {{- if .Values.configFiles }}
            {{- range $filename, $_ := .Values.configFiles }}
            - name: config
              mountPath: {{ $.Values.configMountPath }}/{{ $filename }}
              subPath: {{ $filename }}
            {{- end }}
            {{- end }}
            {{- if .Values.existingConfigMap }}
            {{- range .Values.configKeys }}
            - name: config
              mountPath: {{ $.Values.configMountPath }}/{{ . }}
              subPath: {{ . }}
            {{- end }}
            {{- end }}
            {{- range .Values.hostPaths }}
            - name: {{ .name }}
              mountPath: {{ .mountPath }}
              readOnly: {{ .readOnly | default false }}
            {{- end }}
          {{- end }}
      {{- if or .Values.persistence.enabled .Values.configFiles .Values.existingConfigMap .Values.hostPaths }}
      volumes:
        {{- if .Values.persistence.enabled }}
        - name: data
          persistentVolumeClaim:
            claimName: {{ .Release.Name }}-data
        {{- end }}
        {{- if or .Values.configFiles .Values.existingConfigMap }}
        - name: config
          configMap:
            name: {{ if .Values.existingConfigMap }}{{ .Values.existingConfigMap }}{{ else }}{{ .Release.Name }}-config{{ end }}
        {{- end }}
        {{- range .Values.hostPaths }}
        - name: {{ .name }}
          hostPath:
            path: {{ .hostPath }}
        {{- end }}
      {{- end }}
