{{- if .Values.hostname }}
apiVersion: traefik.io/v1alpha1
kind: IngressRoute
metadata:
  name: {{ .Release.Name }}
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "homelab-app.labels" . | nindent 4 }}
spec:
  entryPoints:
    - websecure
  routes:
    - match: Host(`{{ .Values.hostname }}`)
      kind: Rule
      services:
        - name: {{ .Release.Name }}
          port: 80
  tls: {}
{{- end }}
