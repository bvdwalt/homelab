---
# talhelper configuration — https://github.com/budimanjojo/talhelper
#
# Render machine configs:  talhelper genconfig --secret-file talsecret.sops.yaml
# Apply to node:           talhelper apply
# Fetch kubeconfig:        talosctl kubeconfig kubeconfig --nodes 10.13.1.166 --talosconfig clusterconfig/talosconfig
#
# Secrets are in talsecret.sops.yaml (SOPS-encrypted, safe to commit).
# Generated machine configs land in clusterconfig/ (gitignored, regenerate on demand).

clusterName: homelab
talosVersion: v1.9.5       # https://github.com/siderolabs/talos/releases
kubernetesVersion: v1.32.4 # https://www.talos.dev/latest/introduction/support-matrix/
endpoint: https://10.13.1.166:6443

# Single-node requirement: removes the NoSchedule taint from the control-plane
# node so that workload pods can actually schedule. Without this every pod stays
# Pending forever on a single-node cluster.
allowSchedulingOnControlPlanes: true

nodes:
  - hostname: thalos
    ipAddress: 10.13.1.166
    installDisk: /dev/vda   # VIRTIO disk appears as vda in Talos
    controlPlane: true
    networkInterfaces:
      - deviceSelector:
          hardwareAddr: "00:a0:98:60:fb:71"
        addresses:
          - 10.13.1.166/24
        routes:
          - network: 0.0.0.0/0
            gateway: 10.13.1.1
        dhcp: false

patches:
  - |-
    machine:
      time:
        servers:
          - 10.13.1.165
  - |-
    cluster:
      # Pin etcd to the LAN interface so it doesn't bind to the pod network.
      etcd:
        advertisedSubnets:
          - 10.13.1.0/24
