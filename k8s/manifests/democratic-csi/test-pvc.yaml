apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: democratic-csi-test
  namespace: democratic-csi
spec:
  accessModes: [ReadWriteOnce]
  storageClassName: truenas-nfs
  resources:
    requests:
      storage: 1Gi
---
apiVersion: v1
kind: Pod
metadata:
  name: democratic-csi-test
  namespace: democratic-csi
spec:
  containers:
    - name: test
      image: busybox
      command: [sh, -c, "echo 'NFS works' > /data/test.txt && cat /data/test.txt && sleep 3600"]
      volumeMounts:
        - name: data
          mountPath: /data
  volumes:
    - name: data
      persistentVolumeClaim:
        claimName: democratic-csi-test
  restartPolicy: Never
