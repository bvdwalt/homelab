---
# Traefik IngressRoute CRD (traefik.io/v1alpha1) rather than standard k8s Ingress.
# Using the CRD gives access to Traefik-specific features (middlewares, priority, TCP
# routes) and mirrors how the existing Swarm Traefik setup handles routing.
apiVersion: traefik.io/v1alpha1
kind: IngressRoute
metadata:
  name: whoami
  namespace: demo
spec:
  entryPoints:
    - web
  routes:
    - match: Host(`whoami.greedo.net`)
      kind: Rule
      services:
        - name: whoami
          port: 80
