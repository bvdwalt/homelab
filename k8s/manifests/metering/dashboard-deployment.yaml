---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: metering-dashboard
  namespace: metering
spec:
  replicas: 1
  selector:
    matchLabels:
      app: metering-dashboard
  strategy:
    type: RollingUpdate
  template:
    metadata:
      labels:
        app: metering-dashboard
    spec:
      containers:
        - name: metering-dashboard
          image: robotwizard/metering-dashboard:0.2.0@sha256:6ce901d953b7815142952abb4e2ac6fb7acc242a8e0185963434a364e838e852
          env:
            - name: VITE_API_HOST
              value: "https://metering-api.greedo.net"
            - name: TZ
              value: "Europe/Amsterdam"
          ports:
            - containerPort: 80
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop: ["ALL"]
            seccompProfile:
              type: RuntimeDefault
