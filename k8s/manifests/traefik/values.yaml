# Traefik Helm values
# https://github.com/traefik/traefik-helm-chart
#
# TLS is terminated by Traefik using the wildcard cert managed by cert-manager.
# CrowdSec and OIDC middleware are out of scope here — added per-service later.
#
# Traffic path: AdGuard DNS *.greedo.net → 10.13.1.160 (MetalLB VIP)
# MetalLB L2 announces 10.13.1.160 via ARP; Traefik gets a LoadBalancer service.
# With a VIP, rolling updates work without hostPort conflicts.
#
# NOTE: if MetalLB is ever removed, restore hostPort :80/:443 and point AdGuard
# DNS back to the node IP (10.13.1.166). Also re-add updateStrategy: Recreate.

deployment:
  replicas: 1

ports:
  web:
    port: 8000
    expose:
      default: true
    exposedPort: 80
    http:
      redirections:
        entryPoint:
          to: websecure
          scheme: https
          permanent: true
  websecure:
    port: 8443
    expose:
      default: true
    exposedPort: 443

service:
  annotations:
    metallb.universe.tf/loadBalancerIPs: "10.13.1.160"
  spec:
    type: LoadBalancer

ingressRoute:
  dashboard:
    enabled: false

logs:
  general:
    level: ERROR
  access:
    enabled: true

providers:
  kubernetesIngress:
    enabled: false
  kubernetesCRD:
    enabled: true
