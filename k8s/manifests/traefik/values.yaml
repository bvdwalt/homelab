# Traefik Helm values
# https://github.com/traefik/traefik-helm-chart
#
# TLS is terminated by Traefik using the wildcard cert managed by cert-manager.
# CrowdSec and OIDC middleware are out of scope here — added per-service later.
#
# Traffic path: AdGuard DNS *.greedo.net → 10.13.1.166 (node IP)
# Traefik binds directly to ports 80 and 443 via hostPort.

deployment:
  replicas: 1

ports:
  web:
    port: 8000
    hostPort: 80
    expose:
      default: true
    exposedPort: 80
  websecure:
    port: 8443
    hostPort: 443
    expose:
      default: true
    exposedPort: 443

service:
  spec:
    type: ClusterIP   # no NodePort needed when using hostPort

ingressRoute:
  dashboard:
    enabled: false

logs:
  general:
    level: ERROR
  access:
    enabled: true

providers:
  kubernetesIngress:
    enabled: false
  kubernetesCRD:
    enabled: true
