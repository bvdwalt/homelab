apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
resources:
  - vaultwarden.yaml
  - actual-budget.yaml
  - pocket-id.yaml
  - metering-api.yaml
  - metering-dashboard.yaml
  - homepage.yaml
  - it-tools.yaml
  - whoami.yaml
  - cullarr.yaml
  - miniflux.yaml
configMapGenerator:
  - name: homepage-config
    namespace: homepage
    options:
      disableNameSuffixHash: true
    files:
      - homepage-config/settings.yaml
      - homepage-config/bookmarks.yaml
      - homepage-config/widgets.yaml
      - homepage-config/services.yaml
      - homepage-config/kubernetes.yaml
      - homepage-config/docker.yaml
      - homepage-config/custom.css
      - homepage-config/custom.js
